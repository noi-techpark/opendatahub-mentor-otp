  #       font-family: Hind, sans-serif
  #     segment_labels:
  #       border-color: "#FFFFFF"
  #       border-radius: 6
  #       border-width: 2
  #       color: "#FFE0D0"
  #       font-family: Hind, sans-serif
  #       font-size: 18px
